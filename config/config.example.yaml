# Copy this file to config/config.yaml for local development.
# Replace every change_me value before running services.
common:
  consul_addr: "localhost:8500"
  rabbitmq_addr: "amqp://change_me:change_me@localhost:5672/"
  redis_addr: "localhost:6379"

user_service:
  port: ":50051"
  name: "user-service"
  node_id: "user-node-1"

product_service:
  port: ":50052"
  name: "product-service"
  node_id: "product-node-1"

order_service:
  port: ":50053"
  name: "order-service"
  node_id: "order-node-1"

api_gateway:
  port: ":8080"
  jwt_secret: "change_me_to_a_long_random_secret"

mysql_dsn: "change_me:change_me@tcp(localhost:3306)/micro_mall?charset=utf8mb4&parseTime=True&loc=Local"
