version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: micro-redis
    ports:
      - "6379:6379"

  consul:
    image: hashicorp/consul:latest
    container_name: micro-consul
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: "agent -dev -client=0.0.0.0"

  rabbitmq:
    image: rabbitmq:management-alpine
    container_name: micro-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?set RABBITMQ_DEFAULT_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?set RABBITMQ_DEFAULT_PASS in .env}

  mysql:
    image: mysql:8.0
    container_name: micro-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-micro_mall}
    command: --default-authentication-plugin=mysql_native_password
